# CapitalFlow Security Whitepaper

## Encryption Standards
| Data Type | Algorithm | Key Size |
|-----------|-----------|----------|
| Passwords | SHA-256 + Salt | 256-bit |
| Documents | AES-256-GCM | 256-bit |
| Transport | TLS 1.3 | 256-bit |
| Sessions | JWT + Device Fingerprint | 512-bit |

## Protection Layers
1. **WAF**: Cloudflare-style rate limiting (100 req/min)
2. **XSS**: Content-Security-Policy headers, input sanitization
3. **SQL Injection**: Parameterized queries via LibSQL
4. **DDoS**: Connection throttling + IP blacklisting
5. **Session Hijacking**: Device fingerprint cookies
6. **Brute Force**: Progressive delay after 5 failed attempts
7. **Quantum**: Post-quantum key exchange preparation (Kyber)

## Audit Trail
All admin actions are logged in `audit_log` table:
- User management changes
- Project creation/deletion
- KYC approvals/rejections
- Deposit approvals
- Role changes

## Compliance
- GDPR: Right to deletion, data portability
- AML: 5-year transaction history retention
- KYC: Multi-level identity verification
- ISO 27001: Information security management

## Recovery
- Seed phrase: 12-word BIP39-style backup
- Telegram bot: /reset command for password reset
- Admin recovery: manual override with 2FA
